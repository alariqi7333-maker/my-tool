<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة اختبار تفاعلية</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
        }
        .box {
            max-width: 400px;
            margin: 0 auto;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #0ea5e9;
        }
        .counter {
            font-size: 48px;
            margin: 20px 0;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>مرحباً بك في صفحة الاختبار</h2>
    <p>اضغط على الزر بالأسفل لاختبار استجابة المتصفح محلياً:</p>
    <div class="counter" id="counterValue">0</div>
    <button onclick="incrementCounter()">زيادة العداد +</button>
</div>

<script>
    let count = 0;
    function incrementCounter() {
        count++;
        document.getElementById('counterValue').innerText = count;
    }
</script>

</body>
</html>
