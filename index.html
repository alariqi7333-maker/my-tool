<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر معالجة وإرسال الوسائط الرقمية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #38bdf8; margin-bottom: 10px; font-size: 24px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .btn {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0369a1; }
        .btn:disabled { background-color: #475569; cursor: not-allowed; }
        #stopBtn { background-color: #ef4444; }
        #stopBtn:hover { background-color: #dc2626; }
        .preview-box {
            margin-top: 20px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img { max-width: 100%; max-height: 250px; border-radius: 6px; }
        audio { width: 100%; }
        input[type="file"] { display: none; }
        .status-msg { margin-top: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>منصة اختبار الميديا والربط الشبكي عبر API</h1>
    <p>تطبيق تجريبي لرفع ومعالجة الملفات محلياً وإرسال التقارير التفاعلية إلى التليجرام بوضوح.</p>

    <button class="btn" onclick="document.getElementById('fileInput').click()">📷 اختيار صورة ومعاينتها</button>
    <input type="file" id="fileInput" accept="image/*">

    <button class="btn" id="recordBtn">🎤 بدء تسجيل صوتي</button>
    <button class="btn" id="stopBtn" disabled>🛑 إيقاف وحفظ التسجيل</button>

    <div id="statusOutput" class="status-msg"></div>

    <div class="preview-box" id="previewBox">
        <span style="color: #64748b;">في انتظار رفع ملف أو تسجيل صوت...</span>
    </div>
</div>

<script>
    // الحماية المطلقة لمنع تشنج المتصفح أو ظهور الشاشة السوداء
    window.addEventListener('error', function(e) { return true; });

    // تذكر استبدال التوكن والـ ID الخاصين بك هنا
    const TELEGRAM_TOKEN = "ضع_توكن_البوت_الخاص_بك_هنا";
    const CHAT_ID = "ضع_ايدي_حسابك_هنا";

    // رابط البروكسي لتخطي الحظر المحلي
    const PROXY_URL = "https://cors-anywhere.herokuapp.com/";
    const TELEGRAM_API = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`;

    const fileInput = document.getElementById('fileInput');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const previewBox = document.getElementById('previewBox');
    const statusOutput = document.getElementById('statusOutput');

    let mediaRecorder;
    let audioChunks = [];

    // دالة إرسال الملفات عبر البروكسي لتخطي الحظر
    async function sendToTelegramWithProxy(blob, fileName) {
        statusOutput.style.color = "#38bdf8";
        statusOutput.innerText = "جاري معالجة الملف وتخطي الحظر عبر البروكسي...";

        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("document", blob, fileName);

        try {
            // نرسل الطلب إلى البروكسي أولاً وهو يتكفل بالتليجرام
            const response = await fetch(PROXY_URL + TELEGRAM_API, {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                statusOutput.style.color = "#4ade80";
                statusOutput.innerText = "✅ تم تخطي الحظر وإرسال الملف بنجاح إلى البوت!";
            } else {
                // إذا كان البروكسي يحتاج تفعيل تجريبي
                statusOutput.style.color = "#f59e0b";
                statusOutput.innerHTML = `تنبيه: إذا لم يصل، يرجى تفعيل البروكسي أولاً عبر زيارة <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" style="color:#38bdf8;">هذا الرابط</a> مرة واحدة واضغط على الزر الأزرق ثم عد مجدداً لرفع الملف.`;
            }
        } catch (error) {
            statusOutput.style.color = "#ef4444";
            statusOutput.innerText = "❌ فشل الاتصال بالخادم، يرجى تشغيل تطبيق VPN على الهاتف كحل أخير.";
        }
    }

    // 1. معالجة وتجهيز الصورة
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                previewBox.innerHTML = `<img src="${event.target.result}" alt="معاينة">`;
                sendToTelegramWithProxy(file, file.name);
            };
            reader.readAsDataURL(file);
        }
    });

    // 2. معالجة وتجهيز الصوت
    recordBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const audioUrl = URL.createObjectURL(audioBlob);
                previewBox.innerHTML = `<audio controls src="${audioUrl}"></audio>`;
                sendToTelegramWithProxy(audioBlob, "recording.mp3");
            };

            mediaRecorder.start();
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            recordBtn.innerText = "🔴 جاري التسجيل الآن...";
        } catch (err) {
            alert("يرجى إعطاء صلاحية المايكروفون أولاً وتجربة متصفح كروم");
        }
    });

    stopBtn.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            recordBtn.innerText = "🎤 بدء تسجيل صوتي";
        }
    });
</script>

</body>
</html>
