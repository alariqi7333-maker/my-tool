<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر معالجة وإرسال الوسائط الرقمية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #38bdf8; margin-bottom: 10px; font-size: 24px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .btn {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0369a1; }
        .btn:disabled { background-color: #475569; cursor: not-allowed; }
        #stopBtn { background-color: #ef4444; }
        #stopBtn:hover { background-color: #dc2626; }
        .preview-box {
            margin-top: 20px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img { max-width: 100%; max-height: 250px; border-radius: 6px; }
        audio { width: 100%; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>منصة اختبار الميديا والربط الشبكي عبر API</h1>
    <p>تطبيق تجريبي لرفع ومعالجة الملفات محلياً وإرسال التقارير التفاعلية إلى التليجرام بوضوح.</p>

    <button class="btn" onclick="document.getElementById('fileInput').click()">📷 اختيار صورة ومعاينتها</button>
    <input type="file" id="fileInput" accept="image/*">

    <button class="btn" id="recordBtn">🎤 بدء تسجيل صوتي</button>
    <button class="btn" id="stopBtn" disabled>🛑 إيقاف وحفظ التسجيل</button>

    <div class="preview-box" id="previewBox">
        <span style="color: #64748b;">في انتظار رفع ملف أو تسجيل صوت...</span>
    </div>
</div>

<script>
    // الحماية من الأخطاء لمنع تشنج الشاشة السوداء
    window.addEventListener('error', function(e) {
        console.log("تخطى الخطأ بأمان:", e.message);
        return true;
    });

    const fileInput = document.getElementById('fileInput');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const previewBox = document.getElementById('previewBox');

    let mediaRecorder;
    let audioChunks = [];

    // 1. معالجة الصورة
    fileInput.addEventListener('change', function(e) {
        try {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewBox.innerHTML = `<img src="${event.target.result}" alt="معاينة">`;
                    // هنا يتم استدعاء دالة الإرسال للبوت المضافة سابقاً لديك
                };
                reader.readAsDataURL(file);
            }
        } catch(err) {
            previewBox.innerHTML = `<span style="color:#ef4444;">حدث خطأ في المعاينة محلياً</span>`;
        }
    });

    // 2. معالجة الصوت بمرونة
    recordBtn.addEventListener('click', async () => {
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("متصفحك لا يدعم تسجيل الصوت، جرب كروم أو سامسونج إنترنت");
                return;
            }
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const audioUrl = URL.createObjectURL(audioBlob);
                previewBox.innerHTML = `<audio controls src="${audioUrl}"></audio>`;
            };

            mediaRecorder.start();
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            recordBtn.innerText = "🔴 جاري التسجيل الآن...";
        } catch (err) {
            alert("يرجى إعطاء صلاحية المايكروفون للمتصفح أولاً");
        }
    });

    stopBtn.addEventListener('click', () => {
        try {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                recordBtn.disabled = false;
                stopBtn.disabled = true;
                recordBtn.innerText = "🎤 بدء تسجيل صوتي";
            }
        } catch(err) { }
    });
</script>

</body>
</html>
