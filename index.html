<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزنني الرقمية الآمنة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }
        label { display: block; margin-bottom: 5px; color: #94a3b8; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { background-color: #0ea5e9; }
        .vault-item {
            background: #0f172a;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            text-align: right;
            border-right: 4px solid #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 الخزنة الشخصية المحلية</h1>
    <p>واجهة تفاعلية لتنظيم وتدوين ملاحظاتك وحاجاتك الهامة محلياً.</p>
    
    <div class="input-group">
        <label>🏷️ عنوان الملاحظة:</label>
        <input type="text" id="noteTitle" placeholder="مثلاً: كلمات مرور تجريبية، أفكار...">
    </div>
    
    <div class="input-group">
        <label>📝 محتوى الملاحظة السري:</label>
        <textarea id="noteContent" rows="4" placeholder="اكتب هنا ما تريد حفظه..."></textarea>
    </div>
    
    <button class="btn" onclick="saveNote()">💾 حفظ في الخزنة المؤقتة</button>
    
    <div id="vaultList">
        </div>
</div>

<script>
    function saveNote() {
        const title = document.getElementById('noteTitle').value;
        const content = document.getElementById('noteContent').value;
        
        if(!title || !content) {
            alert("يرجى ملء العنوان والمحتوى أولاً!");
            return;
        }
        
        const vaultList = document.getElementById('vaultList');
        
        // إنشاء عنصر جديد في القائمة محلياً
        const item = document.createElement('div');
        item.className = 'vault-item';
        item.innerHTML = `<strong>📌 ${title}:</strong> <p>${content}</p>`;
        
        vaultList.appendChild(item);
        
        // مسح الخانات بعد الحفظ
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
    }
</script>

</body>
</html>
