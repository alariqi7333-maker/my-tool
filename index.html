<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزنني السحابية المشفرة الآمنة</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // مفاتيح الاتصال الحقيقية والكاملة الخاصة بمشروعك
        const firebaseConfig = {
          apiKey: "AIzaSyA291VBmybm4gvrZM8Z-26scGgFTK9wn-c",
          authDomain: "myblatfrom.firebaseapp.com",
          projectId: "myblatfrom",
          storageBucket: "myblatfrom.firebasestorage.app",
          messagingSenderId: "1084981629473",
          appId: "1:1084981629473:web:c211330b27e6d5a5940960",
          measurementId: "G-VZK3TTRM75"
        };

        // تهيئة اتصال السيرفر وقاعدة البيانات
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // دالة التشفير السيبرانية المتوافقة مع أمن البيانات (تشفير من طرف لآخر)
        function encryptData(input, key) {
            let output = "";
            for (let i = 0; i < input.length; i++) {
                output += String.fromCharCode(input.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return btoa(unescape(encodeURIComponent(output)));
        }

        // دالة فك التشفير عند استرجاع البيانات للمتصفح
        function decryptData(encryptedBase64, key) {
            try {
                let decoded = decodeURIComponent(escape(atob(encryptedBase64)));
                let output = "";
                for (let i = 0; i < decoded.length; i++) {
                    output += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return output;
            } catch (e) { return null; }
        }

        // دالة تحويل، تشفير، ورفع الوسائط سحابياً
        async function processAndSave() {
            const title = document.getElementById('mediaTitle').value;
            const secretKey = document.getElementById('secretKey').value;
            const fileInput = document.getElementById('mediaFile');
            const file = fileInput.files[0];
            
            if (!title || !file || !secretKey) {
                alert("🔴 خطأ: يرجى كتابة الرمز السري، وصف الملف، واختيار الملف أولاً!");
                return;
            }

            if (secretKey.length < 4) {
                alert("⚠️ للأمان العالي، يرجى كتابة رمز سري من 4 خانات أو أكثر.");
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result;
                
                // التشفير داخل المتصفح قبل خروج البيانات إلى قاعدة البيانات
                const encryptedData = encryptData(base64Data, secretKey);
                const encryptedTitle = encryptData(title, secretKey);

                try {
                    await addDoc(collection(db, "secure_vault_media"), {
                        title: encryptedTitle,
                        fileData: encryptedData,
                        fileType: file.type,
                        timestamp: new Date()
                    });
                    alert("🔒 تم تشفير الملف بنجاح ورفعه إلى سيرفرك السحابي الآمن!");
                    document.getElementById('mediaTitle').value = '';
                    fileInput.value = '';
                    loadMedia();
                } catch (error) {
                    alert("❌ فشل الرفع السحابي! تأكد من ضبط الإعدادات في لوحة تحكم Firestore.");
                }
            };
            reader.readAsDataURL(file);
        }

        // دالة جلب البيانات الحية وفك تعميتها برمزك الخاص
        async function loadMedia() {
            const secretKey = document.getElementById('secretKey').value;
            if (!secretKey) {
                alert("🔑 أدخل مفتاح التشفير الرئيسي أولاً لعرض مستنداتك!");
                return;
            }

            const vaultList = document.getElementById('vaultList');
            vaultList.innerHTML = '<p style="color:#38bdf8;">🔄 جاري جلب الأكواد المشفرة وفك تعميتها حياً...</p>';
            
            try {
                const q = query(collection(db, "secure_vault_media"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                vaultList.innerHTML = '';

                let itemsCount = 0;

                querySnapshot.forEach((doc) => {
                    const item = doc.data();
                    const decryptedTitle = decryptData(item.title, secretKey);
                    const decryptedData = decryptData(item.fileData, secretKey);

                    // إذا نجح فك الشفرة (الرمز السري متطابق)
                    if (decryptedTitle && decryptedData) {
                        itemsCount++;
                        const container = document.createElement('div');
                        container.className = 'vault-item';
                        
                        let mediaElement = '';
                        if (item.fileType.startsWith('image/')) {
                            mediaElement = `<img src="${decryptedData}" class="media-preview" />`;
                        } else if (item.fileType.startsWith('video/')) {
                            mediaElement = `<video src="${decryptedData}" controls class="media-preview"></video>`;
                        } else if (item.fileType.startsWith('audio/')) {
                            mediaElement = `<audio src="${decryptedData}" controls style="width:100%; margin-top:10px;"></audio>`;
                        } else {
                            mediaElement = `<br><a href="${decryptedData}" download="${decryptedTitle}" class="download-link">📥 تحميل المستند المسترجع</a>`;
                        }

                        container.innerHTML = `
                            <strong>📌 ${decryptedTitle}</strong>
                            <span style="font-size:11px; color:#64748b; float:left;">🔒 مشفر End-to-End</span>
                            <div style="clear:both;"></div>
                            ${mediaElement}
                        `;
                        vaultList.appendChild(container);
                    }
                });

                if(itemsCount === 0) {
                    vaultList.innerHTML = '<p style="color:#94a3b8;">⚠️ لا توجد وسائط متطابقة أو أن رمزك السري المدخل خاطئ.</p>';
                }

            } catch (error) {
                vaultList.innerHTML = '<p style="color:#ef4444;">❌ خطأ اتصال سحابي. تأكد من تفعيل Firestore.</p>';
            }
        }

        // ربط برمجيات الأزرار بالـ Window
        window.processAndSave = processAndSave;
        window.loadMedia = loadMedia;
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 20px; direction: rtl; margin: 0; }
        .container { max-width: 650px; margin: 20px auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 6px; color: #94a3b8; font-weight: 500; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #38bdf8; outline: none; }
        input[type="file"] { background: #0f172a; color: #94a3b8; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #475569; cursor: pointer; }
        .btn { background-color: #38bdf8; color: #0f172a; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background-color: #0ea5e9; }
        .btn-sec { background-color: #334155; color: #f8fafc; border: 1px solid #475569; margin-top: 8px; }
        .btn-sec:hover { background-color: #475569; }
        .vault-item { background: #0f172a; padding: 18px; margin-top: 15px; border-radius: 8px; text-align: right; border-right: 4px solid #38bdf8; border-top: 1px solid #1e293b; }
        .media-preview { max-width: 100%; max-height: 280px; margin-top: 12px; border-radius: 6px; border: 1px solid #334155; }
        .download-link { color: #38bdf8; display: inline-block; margin-top: 10px; text-decoration: none; font-weight: bold; }
        .download-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 خزنتي السحابية الآمنة</h1>
    <p class="subtitle">نظام تشفير متطور (End-to-End). ارفع ملفاتك لتصل إليها من أي متصفح بكلمة سر موحدة.</p>
    
    <div class="input-group">
        <label>🔑 مفتاح التشفير الرئيسي الموحد (احفظه جيداً):</label>
        <input type="password" id="secretKey" placeholder="اكتب كلمة سر مشفرة لفتح وقفل خزنتك">
    </div>

    <hr style="border-color: #334155; margin: 20px 0;">

    <div class="input-group">
        <label>🏷️ اسم أو وصف الملف:</label>
        <input type="text" id="mediaTitle" placeholder="مثلاً: صورة الاستوديو، مستند خاص...">
    </div>
    
    <div class="input-group">
        <label>📎 اختر الملف أو الوسائط المراد إخفاؤها:</label>
        <input type="file" id="mediaFile" accept="image/*,video/*,audio/*,application/pdf">
    </div>
    
    <button class="btn" onclick="processAndSave()">🔒 تشفير ورفع سحابي آمن</button>
    <button class="btn btn-sec" onclick="loadMedia()">🔄 فك تشفير وعرض ملفاتي من السحاب</button>
    
    <div id="vaultList" style="margin-top: 25px;"></div>
</div>

</body>
</html>
