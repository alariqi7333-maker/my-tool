<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزنني الرقمية للوسائط</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 650px;
            margin: 30px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }
        label { display: block; margin-bottom: 5px; color: #94a3b8; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        input[type="file"] {
            background: #0f172a;
            color: #94a3b8;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #475569;
            cursor: pointer;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .btn:hover { background-color: #0ea5e9; }
        .vault-item {
            background: #0f172a;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            text-align: right;
            border-right: 4px solid #38bdf8;
            position: relative;
        }
        .media-preview {
            max-width: 100%;
            max-height: 250px;
            margin-top: 10px;
            border-radius: 6px;
            display: block;
        }
        .delete-btn {
            position: absolute;
            left: 15px;
            top: 15px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📁 خزنة الوسائط المحلية الآمنة</h1>
    <p>قم بحفظ صورك وملفاتك الحساسة داخل ذاكرة جهازك مباشرة دون إنترنت.</p>
    
    <div class="input-group">
        <label>🏷️ اسم أو وصف الملف:</label>
        <input type="text" id="mediaTitle" placeholder="مثلاً: صورتي الشخصية، مستند هام...">
    </div>
    
    <div class="input-group">
        <label>📎 اختر الملف أو الصورة (يفضل حجم صغير):</label>
        <input type="file" id="mediaFile" accept="image/*,video/*,audio/*,application/pdf">
    </div>
    
    <button class="btn" onclick="processAndSave()">💾 تشفير وحفظ في الجهاز</button>
    
    <div id="vaultList">
        </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", loadMedia);

    function processAndSave() {
        const title = document.getElementById('mediaTitle').value;
        const fileInput = document.getElementById('mediaFile');
        const file = fileInput.files[0];
        
        if (!title || !file) {
            alert("يرجى إدخال الوصف واختيار ملف أولاً!");
            return;
        }

        // قراءة الملف وتحويله إلى Base64
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            const fileType = file.type;

            let mediaVault = JSON.parse(localStorage.getItem('my_media_vault')) || [];
            mediaVault.push({ title: title, data: base64Data, type: fileType });
            
            try {
                localStorage.setItem('my_media_vault', JSON.stringify(mediaVault));
                loadMedia();
                // تفريغ الخانات بعد النجاح
                document.getElementById('mediaTitle').value = '';
                fileInput.value = '';
            } catch (error) {
                alert("❌ فشل الحفظ! قد يكون حجم الملف كبيراً جداً بالنسبة لذاكرة المتصفح المحلية.");
            }
        };
        
        reader.readAsDataURL(file);
    }

    function loadMedia() {
        const vaultList = document.getElementById('vaultList');
        vaultList.innerHTML = '';
        
        let mediaVault = JSON.parse(localStorage.getItem('my_media_vault')) || [];
        
        mediaVault.forEach((item, index) => {
            const container = document.createElement('div');
            container.className = 'vault-item';
            
            let mediaElement = '';
            
            // التحقق من نوع الملف لعرض المعاينة المناسبة
            if (item.type.startsWith('image/')) {
                mediaElement = `<img src="${item.data}" class="media-preview" />`;
            } else if (item.type.startsWith('video/')) {
                mediaElement = `<video src="${item.data}" controls class="media-preview"></video>`;
            } else if (item.type.startsWith('audio/')) {
                mediaElement = `<audio src="${item.data}" controls style="margin-top:10px; width:100%;"></audio>`;
            } else {
                mediaElement = `<br><a href="${item.data}" download="${item.title}" style="color:#38bdf8; display:inline-block; margin-top:10px;">📥 تحميل الملف المستند</a>`;
            }

            container.innerHTML = `
                <strong>📌 ${item.title}</strong>
                <button class="delete-btn" onclick="deleteMedia(${index})">حذف 🗑️</button>
                ${mediaElement}
            `;
            vaultList.appendChild(container);
        });
    }

    function deleteMedia(index) {
        let mediaVault = JSON.parse(localStorage.getItem('my_media_vault')) || [];
        mediaVault.splice(index, 1);
        localStorage.setItem('my_media_vault', JSON.stringify(mediaVault));
        loadMedia();
    }
</script>

</body>
</html>
